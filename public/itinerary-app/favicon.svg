<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo -->
  <rect width="100" height="100" rx="20" fill="#4A6CF7"/>
  
  <!-- Icono de maleta simplificado -->
  <g fill="white">
    <!-- Cuerpo de la maleta -->
    <rect x="25" y="35" width="50" height="40" rx="5"/>
    <!-- Asa -->
    <rect x="38" y="25" width="24" height="12" rx="3" fill="#4A6CF7" stroke="white" stroke-width="3"/>
    <!-- Línea decorativa -->
    <line x1="35" y1="50" x2="65" y2="50" stroke="#4A6CF7" stroke-width="3"/>
    <line x1="35" y1="60" x2="65" y2="60" stroke="#4A6CF7" stroke-width="3"/>
    <!-- Ruedas -->
    <circle cx="35" cy="78" r="5" fill="white"/>
    <circle cx="65" cy="78" r="5" fill="white"/>
  </g>
</svg>