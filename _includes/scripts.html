<!-- Theme toggle script -->
<script>
  (function() {
    'use strict';
    
    // Get theme from localStorage or system preference
    function getTheme() {
      const stored = localStorage.getItem('theme');
      if (stored) return stored;
      
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      return prefersDark ? 'dark' : 'light';
    }
    
    // Apply theme
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      
      // Update toggle button
      const toggle = document.getElementById('themeToggle');
      if (toggle) {
        const iconLight = toggle.querySelector('.theme-icon-light');
        const iconDark = toggle.querySelector('.theme-icon-dark');
        if (iconLight && iconDark) {
          iconLight.style.display = theme === 'light' ? 'inline-block' : 'none';
          iconDark.style.display = theme === 'dark' ? 'inline-block' : 'none';
        }
        toggle.setAttribute('aria-label', theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
      }
    }
    
    // Toggle theme
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      setTheme(next);
    }
    
    // Initialize theme
    document.addEventListener('DOMContentLoaded', function() {
      const theme = getTheme();
      setTheme(theme);
      
      // Add toggle event listener
      const toggle = document.getElementById('themeToggle');
      if (toggle) {
        toggle.addEventListener('click', toggleTheme);
      }
      
      // Listen for system theme changes
      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      mediaQuery.addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          const newTheme = e.matches ? 'dark' : 'light';
          setTheme(newTheme);
        }
      });
    });
  })();
</script>

<!-- Progress bar script -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const progressBar = document.getElementById('progressBar');
    
    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const scrollPercent = (scrollTop / docHeight) * 100;
      
      if (progressBar) {
        progressBar.style.width = Math.min(scrollPercent, 100) + '%';
      }
    }
    
    window.addEventListener('scroll', updateProgress);
    window.addEventListener('resize', updateProgress);
    updateProgress();
  });
</script>
